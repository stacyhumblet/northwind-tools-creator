<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northwind Tools - Creator &amp; Ecommerce</title>
<style>
/* ─────────────────────────────────────────
   Northwind Tools Suite — Light Mode
   Brand palette: Navy (#1a2744) · Teal (#1a6e94)
───────────────────────────────────────── */
:root {
  --color-bg:          #f0f4f8;
  --color-surface:     #ffffff;
  --color-surface-2:   #e8edf4;
  --color-border:      rgba(26, 110, 148, 0.18);
  --color-primary:     #1a6e94;
  --color-primary-dim: rgba(26, 110, 148, 0.12);
  --color-text:        #0d1f3c;
  --color-text-muted:  rgba(13, 31, 60, 0.5);
  --color-success:     #197a6a;
  --color-error:       #c0394a;

  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.08);
  --transition:  0.2s ease;
}

/* ─────────────────────────────────────────
   Reset & base
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─────────────────────────────────────────
   Header
───────────────────────────────────────── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(240, 244, 248, 0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--color-border);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.brand-logo-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 46px;
  height: 46px;
  background: rgba(255, 255, 255, 0.95);
  border-radius: var(--radius-md);
  padding: 5px;
  flex-shrink: 0;
  border: 1px solid var(--color-border);
}

.brand-logo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.brand-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--color-text);
}

.brand-sub {
  font-size: 10px;
  color: var(--color-primary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  opacity: 0.85;
}

/* Header controls */
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  justify-content: flex-end;
}

.search-wrap {
  position: relative;
  width: 230px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--color-text-muted);
  pointer-events: none;
}

#searchInput {
  width: 100%;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-size: 14px;
  padding: 8px 12px 8px 40px;
  outline: none;
  font-family: inherit;
  transition: border-color var(--transition), box-shadow var(--transition);
}

#searchInput::placeholder { color: var(--color-text-muted); }

#searchInput:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-dim);
}

.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-muted);
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition), background var(--transition);
  flex-shrink: 0;
}

.icon-btn:hover {
  color: var(--color-primary);
  border-color: var(--color-primary);
  background: var(--color-primary-dim);
}

.icon-btn .material-symbols-outlined { font-size: 20px; }

/* ─────────────────────────────────────────
   Main / grid
───────────────────────────────────────── */
main {
  flex: 1;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
  padding: 24px 24px 64px;
}

/* ── Section headings ── */
.section-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.1px;
  color: var(--color-text-muted);
}

.section-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border);
}

.section-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── App grid ── */
.app-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.category-section {
  display: flex;
  flex-direction: column;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 16px;
}

/* ─────────────────────────────────────────
   App card
───────────────────────────────────────── */
.app-card {
  position: relative;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  text-decoration: none;
  color: inherit;
  transition:
    transform var(--transition),
    border-color var(--transition),
    box-shadow var(--transition),
    background var(--transition);
  overflow: hidden;
  cursor: pointer;
}

.app-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  background: var(--accent, var(--color-primary));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--transition);
}

.app-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent, var(--color-primary));
  box-shadow: var(--shadow-card), 0 0 0 1px var(--accent, var(--color-primary)) inset;
  background: var(--color-surface-2);
}

.app-card:hover::before { transform: scaleX(1); }

/* Card icon bubble */
.card-icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-dim, var(--color-primary-dim));
  flex-shrink: 0;
}

.card-icon-wrap .material-symbols-outlined {
  font-size: 24px;
  color: var(--accent, var(--color-primary));
}

/* Card content */
.card-body { display: flex; flex-direction: column; gap: 5px; flex: 1; }

.card-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--color-text);
}

.card-category {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent, var(--color-primary));
}

.card-purpose {
  font-size: 12px;
  color: var(--color-text-muted);
  line-height: 1.55;
  margin-top: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Launch badge */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-muted);
  transition: color var(--transition);
}

.app-card:hover .card-footer { color: var(--accent, var(--color-primary)); }

.card-footer .material-symbols-outlined { font-size: 16px; }

/* ─────────────────────────────────────────
   State containers
───────────────────────────────────────── */
.state-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 340px;
  gap: 16px;
  color: var(--color-text-muted);
}

.state-icon {
  font-size: 56px;
  color: var(--color-text-muted);
}

.error-icon { color: var(--color-error); }

.spinner {
  width: 42px;
  height: 42px;
  border: 3px solid var(--color-border);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.btn-primary {
  padding: 10px 28px;
  background: var(--color-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
}

.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

/* ─────────────────────────────────────────
   Footer
───────────────────────────────────────── */
.site-footer {
  border-top: 1px solid var(--color-border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--color-text-muted);
  gap: 16px;
  flex-wrap: wrap;
  background: var(--color-surface);
}

.footer-link {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--color-text-muted);
  text-decoration: none;
  font-weight: 500;
  transition: color var(--transition);
}

.footer-link:hover { color: var(--color-primary); }
.footer-link .material-symbols-outlined { font-size: 16px; }

/* ─────────────────────────────────────────
   Section navigator (floating left)
───────────────────────────────────────── */
.section-nav {
  position: fixed;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 90;
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 8px 6px;
}

.section-nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--color-text-muted);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 10px 5px 8px;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  cursor: pointer;
  white-space: nowrap;
}

.section-nav-item .nav-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.4;
  transition: all var(--transition);
}

.section-nav-item:hover {
  color: var(--color-text);
  background: var(--color-surface-2);
}

.section-nav-item:hover .nav-dot {
  opacity: 1;
  transform: scale(1.3);
}

.section-nav-item.active {
  color: var(--color-text);
  background: var(--color-surface-2);
  font-weight: 600;
}

.section-nav-item.active .nav-dot {
  opacity: 1;
  transform: scale(1.4);
}

/* ─────────────────────────────────────────
   Scroll hint arrow
───────────────────────────────────────── */
.scroll-hint {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text-muted);
  pointer-events: none;
  animation: bounce-hint 1.6s ease-in-out infinite;
  transition: opacity 0.4s ease;
}

.scroll-hint .material-symbols-outlined { font-size: 22px; }

.scroll-hint.hint-fade-out {
  opacity: 0;
  pointer-events: none;
}

@keyframes bounce-hint {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(6px); }
}

/* ─────────────────────────────────────────
   Screenshot preview popup
───────────────────────────────────────── */
.card-preview-popup {
  position: fixed;
  z-index: 300;
  width: 320px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px) scale(0.97);
  transition: opacity 0.15s ease, transform 0.15s ease;
}

.card-preview-popup.preview-visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.card-preview-popup img {
  width: 100%;
  height: auto;
  max-height: 210px;
  object-fit: cover;
  object-position: top center;
  display: block;
}

.card-preview-label {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  border-top: 1px solid var(--color-border);
}

/* ─────────────────────────────────────────
   Utility
───────────────────────────────────────── */
.hidden { display: none !important; }

/* Refresh spin animation */
@keyframes spin-once {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.spin-once { animation: spin-once 0.5s ease; }

/* ─────────────────────────────────────────
   Responsive
───────────────────────────────────────── */
@media (max-width: 600px) {
  .header-inner  { padding: 0 16px; }
  .brand-sub     { display: none; }
  main           { padding: 16px 16px 48px; }
  .cards-grid    { grid-template-columns: 1fr; }
  .section-nav   { display: none; }
  .scroll-hint   { display: none; }
}

@media (min-width: 601px) and (max-width: 1100px) {
  .section-nav { display: none; }
}

@media (min-width: 1101px) {
  main { padding-left: 220px; }
}

@media (max-width: 800px) {
  .search-wrap { width: 170px; }
}
</style>

  <div id="scrollHint" class="scroll-hint">
    <span class="material-symbols-outlined">expand_more</span>
  </div>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <span id="lastUpdated"></span>
    <a
      href="https://docs.google.com/spreadsheets/d/1emAXWbsmxsSvlsgiU7W0PeWyrW4iU-rk7fLkal3huUE/edit?gid=0#gid=0"
      target="_blank"
      rel="noopener noreferrer"
      class="footer-link"
    >
      <span class="material-symbols-outlined">table_chart</span>
      Edit in Sheets
    </a>
  </footer>

  <!-- ── Screenshot hover preview ── -->
  <div id="cardPreview" class="card-preview-popup">
    <img id="cardPreviewImg" alt="App preview" />
    <div class="card-preview-label"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyjaaVPJoYTi7jIStTxI5IM3ngOb0qtnSfJL7WU69TYyltvLkQIGNTaBXW19eTCy48/exec';
  </script>
  <script>
'use strict';

/* ─────────────────────────────────────────
   Category → Material Symbol icon mapping
───────────────────────────────────────── */
const CATEGORY_ICONS = {
  'default':      'widgets',
  'reporting':    'bar_chart',
  'report':       'bar_chart',
  'analytics':    'analytics',
  'finance':      'payments',
  'hr':           'people',
  'ops':          'settings',
  'operations':   'settings',
  'marketing':    'campaign',
  'sales':        'trending_up',
  'engineering':  'code',
  'tech':         'code',
  'data':         'database',
  'tools':        'build',
  'admin':        'admin_panel_settings',
  'compliance':   'verified_user',
  'legal':        'gavel',
  'support':      'support_agent',
  'content':      'article',
  'media':        'play_circle',
  'scheduling':   'calendar_month',
  'dashboard':    'dashboard',
  'workflow':     'account_tree',
  'automation':   'smart_toy',
};

/* ─────────────────────────────────────────
   Northwind-themed accent palette
   (Navy/Teal family + harmonious accents)
───────────────────────────────────────── */
const ACCENTS = [
  { color: '#5a9fc2', dim: 'rgba(90,159,194,0.15)'  },  // teal (brand primary)
  { color: '#34a08e', dim: 'rgba(52,160,142,0.15)'  },  // teal-green
  { color: '#6a8bc9', dim: 'rgba(106,139,201,0.15)' },  // blue-violet
  { color: '#c9a84c', dim: 'rgba(201,168,76,0.15)'  },  // warm gold
  { color: '#3ab8cc', dim: 'rgba(58,184,204,0.15)'  },  // cyan-teal
  { color: '#8a7fc9', dim: 'rgba(138,127,201,0.15)' },  // soft purple
  { color: '#7890b0', dim: 'rgba(120,144,176,0.15)' },  // steel blue
  { color: '#a07ec9', dim: 'rgba(160,126,201,0.15)' },  // lavender
];

/* ─────────────────────────────────────────
   State
───────────────────────────────────────── */
let allApps       = [];
let searchQuery   = '';
let categoryOrder = [];
let accentMap     = {};

/* ─────────────────────────────────────────
   DOM refs
───────────────────────────────────────── */
const loadingState = document.getElementById('loadingState');
const errorState   = document.getElementById('errorState');
const emptyState   = document.getElementById('emptyState');
const appGrid      = document.getElementById('appGrid');
const searchInput  = document.getElementById('searchInput');
const searchWrap   = document.getElementById('searchWrap');
const refreshBtn   = document.getElementById('refreshBtn');
const retryBtn     = document.getElementById('retryBtn');
const lastUpdated  = document.getElementById('lastUpdated');
const errorMessage = document.getElementById('errorMessage');

/* ─────────────────────────────────────────
   Load apps from data
───────────────────────────────────────── */
function loadApps(apps) {
  if (!apps || apps.length === 0) {
    errorMessage.textContent = 'No valid app entries found in the sheet.';
    showState('error');
    return;
  }
  allApps = apps;
  buildCategoryMeta();
  renderGrid();
  lastUpdated.textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
  buildSectionNav();
  setupScrollHint();
}

/* ─────────────────────────────────────────
   Load from API
───────────────────────────────────────── */
function loadFromAPI() {
  showState('loading');
  fetch(API_URL)
    .then(function(r) { return r.json(); })
    .then(function(apps) {
      if (!Array.isArray(apps) || apps.length === 0) {
        errorMessage.textContent = 'No tools found. Check the spreadsheet.';
        showState('error');
      } else {
        loadApps(apps);
      }
    })
    .catch(function(err) {
      errorMessage.textContent = err.message || 'Failed to load tools.';
      showState('error');
    });
}

/* ─────────────────────────────────────────
   Refresh
───────────────────────────────────────── */
function refreshApps() {
  loadFromAPI();
}

/* ─────────────────────────────────────────
   Build category metadata (order + accents)
───────────────────────────────────────── */
function buildCategoryMeta() {
  categoryOrder = [];
  accentMap     = {};
  var accentIdx = 0;
  for (var i = 0; i < allApps.length; i++) {
    var cat = allApps[i].category;
    if (!categoryOrder.includes(cat)) {
      categoryOrder.push(cat);
      accentMap[cat] = ACCENTS[accentIdx % ACCENTS.length];
      accentIdx++;
    }
  }
}

/* ─────────────────────────────────────────
   Derive icon for a category label
───────────────────────────────────────── */
function iconForCategory(category) {
  var key = category.toLowerCase();
  for (var k in CATEGORY_ICONS) {
    if (key.includes(k)) return CATEGORY_ICONS[k];
  }
  return CATEGORY_ICONS['default'];
}

/* ─────────────────────────────────────────
   Render the app grid
───────────────────────────────────────── */
function renderGrid() {
  appGrid.innerHTML = '';
  var q = searchQuery.toLowerCase();

  var filtered = allApps.filter(function(app) {
    return !q || app.title.toLowerCase().includes(q) || app.category.toLowerCase().includes(q);
  });

  if (filtered.length === 0) { showState('empty'); return; }
  showState('grid');

  var visibleCats = categoryOrder.filter(function(cat) {
    return filtered.some(function(a) { return a.category === cat; });
  });

  var byCategory = {};
  for (var i = 0; i < filtered.length; i++) {
    var app = filtered[i];
    if (!byCategory[app.category]) byCategory[app.category] = [];
    byCategory[app.category].push(app);
  }

  for (var c = 0; c < visibleCats.length; c++) {
    var cat    = visibleCats[c];
    var apps   = byCategory[cat] || [];
    var accent = accentMap[cat] || ACCENTS[0];
    var icon   = iconForCategory(cat);

    var section = document.createElement('div');
    section.className = 'category-section';
    section.id = 'section-' + cat.replace(/[^a-z0-9]+/gi, '-').toLowerCase();

    var heading = document.createElement('div');
    heading.className = 'section-heading';
    heading.innerHTML =
      '<span class="section-dot" style="background:' + accent.color + '"></span>' +
      escapeHTML(cat);
    section.appendChild(heading);

    var cardsGrid = document.createElement('div');
    cardsGrid.className = 'cards-grid';
    for (var j = 0; j < apps.length; j++) {
      cardsGrid.appendChild(buildCard(apps[j], accent, icon));
    }
    section.appendChild(cardsGrid);
    appGrid.appendChild(section);
  }
}

/* ─────────────────────────────────────────
   Build a single app card
───────────────────────────────────────── */
function buildCard(app, accent, icon) {
  var a = document.createElement('a');
  a.className = 'app-card';
  a.href      = app.url;
  a.target    = '_blank';
  a.rel       = 'noopener noreferrer';
  a.setAttribute('aria-label', 'Open ' + app.title);
  a.style.setProperty('--accent',     accent.color);
  a.style.setProperty('--accent-dim', accent.dim);
  if (app.screenshot) a.dataset.screenshot = app.screenshot;

  var titleHTML = searchQuery ? highlightMatch(app.title, searchQuery) : escapeHTML(app.title);

  a.innerHTML =
    '<div class="card-icon-wrap">' +
      '<span class="material-symbols-outlined">' + icon + '</span>' +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-category">' + escapeHTML(app.category) + '</div>' +
      '<div class="card-title">'    + titleHTML                 + '</div>' +
      (app.purpose ? '<div class="card-purpose">' + escapeHTML(app.purpose) + '</div>' : '') +
    '</div>' +
    '<div class="card-footer">Launch <span class="material-symbols-outlined">open_in_new</span></div>';

  return a;
}

/* ─────────────────────────────────────────
   Show / hide state panels
───────────────────────────────────────── */
function showState(state) {
  loadingState.classList.add('hidden');
  errorState.classList.add('hidden');
  emptyState.classList.add('hidden');
  appGrid.classList.add('hidden');
  document.getElementById(
    state === 'loading' ? 'loadingState' :
    state === 'error'   ? 'errorState'   :
    state === 'empty'   ? 'emptyState'   : 'appGrid'
  ).classList.remove('hidden');
}

/* ─────────────────────────────────────────
   Screenshot hover preview
───────────────────────────────────────── */
(function() {
  var popup      = document.getElementById('cardPreview');
  var popupImg   = document.getElementById('cardPreviewImg');
  var hideTimer  = null;
  var activeCard = null;
  var POPUP_W    = 320;

  function positionAndShow(card) {
    var rect  = card.getBoundingClientRect();
    var above = rect.top > 260;
    var top   = above ? rect.top - 260 - 8 : rect.bottom + 8;
    var left  = rect.left + rect.width / 2 - POPUP_W / 2;
    left = Math.max(8, Math.min(left, window.innerWidth - POPUP_W - 8));
    popup.style.top  = top  + 'px';
    popup.style.left = left + 'px';
    popup.classList.add('preview-visible');
  }

  function showPreview(card) {
    var url = card.dataset.screenshot;
    if (!url) return;
    clearTimeout(hideTimer);
    activeCard = card;
    popup.querySelector('.card-preview-label').textContent =
      card.querySelector('.card-title').textContent;

    if (popupImg.dataset.loadedUrl === url) {
      positionAndShow(card); return;
    }

    popup.classList.remove('preview-visible');
    popupImg.onload = function() {
      if (activeCard === card) {
        popupImg.dataset.loadedUrl = url;
        positionAndShow(card);
      }
    };
    popupImg.onerror = function() { popupImg.dataset.loadedUrl = ''; };
    popupImg.src = url;
  }

  function hidePreview() {
    activeCard = null;
    hideTimer = setTimeout(function() {
      popup.classList.remove('preview-visible');
    }, 100);
  }

  document.addEventListener('mouseover', function(e) {
    var card = e.target.closest('.app-card[data-screenshot]');
    if (card) showPreview(card);
  });
  document.addEventListener('mouseout', function(e) {
    var card = e.target.closest('.app-card[data-screenshot]');
    if (card) hidePreview();
  });
})();

/* ─────────────────────────────────────────
   Helpers
───────────────────────────────────────── */
function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, function(ch) {
    return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[ch];
  });
}

function highlightMatch(text, query) {
  if (!query) return escapeHTML(text);
  var escaped  = escapeHTML(text);
  var escapedQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(
    new RegExp('(' + escapedQ + ')', 'gi'),
    '<mark style="background:rgba(90,159,194,0.35);color:inherit;border-radius:2px;">$1</mark>'
  );
}

/* ─────────────────────────────────────────
   Section navigator + scroll spy
───────────────────────────────────────── */
function buildSectionNav() {
  var nav = document.getElementById('sectionNav');
  if (!nav) return;
  nav.innerHTML = '';

  for (var i = 0; i < categoryOrder.length; i++) {
    var cat    = categoryOrder[i];
    var accent = accentMap[cat] || ACCENTS[0];
    var id     = 'section-' + cat.replace(/[^a-z0-9]+/gi, '-').toLowerCase();

    var item = document.createElement('a');
    item.className      = 'section-nav-item';
    item.href           = '#' + id;
    item.dataset.target = id;
    item.innerHTML =
      '<span class="nav-dot" style="background:' + accent.color +
        ';box-shadow:0 0 0 2px ' + accent.color + '33"></span>' +
      '<span class="nav-label">' + escapeHTML(cat) + '</span>';

    (function(targetId) {
      item.addEventListener('click', function(e) {
        e.preventDefault();
        var el = document.getElementById(targetId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    })(id);

    nav.appendChild(item);
  }

  var navItems = nav.querySelectorAll('.section-nav-item');

  function updateActiveSection() {
    var sections    = document.querySelectorAll('.category-section[id]');
    var currentId   = null;
    var viewportMid = window.scrollY + window.innerHeight * 0.45;

    sections.forEach(function(s) {
      var sectionTop = s.getBoundingClientRect().top + window.scrollY;
      if (sectionTop <= viewportMid) currentId = s.id;
    });

    if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 8 &&
        sections.length > 0) {
      currentId = sections[sections.length - 1].id;
    }

    navItems.forEach(function(el) {
      el.classList.toggle('active', el.dataset.target === currentId);
    });
  }

  window.addEventListener('scroll', updateActiveSection, { passive: true });
  updateActiveSection();
}

/* ─────────────────────────────────────────
   Scroll hint arrow
───────────────────────────────────────── */
function setupScrollHint() {
  var hint = document.getElementById('scrollHint');
  if (!hint) return;

  if (document.documentElement.scrollHeight <= window.innerHeight + 10) {
    hint.classList.add('hidden');
    return;
  }

  function onScroll() {
    if (window.scrollY > 80) {
      hint.classList.add('hint-fade-out');
      window.removeEventListener('scroll', onScroll);
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
}

/* ─────────────────────────────────────────
   Event listeners
───────────────────────────────────────── */
searchInput.addEventListener('input', function() {
  searchQuery = searchInput.value.trim();
  renderGrid();
});

refreshBtn.addEventListener('click', function() {
  var icon = refreshBtn.querySelector('.material-symbols-outlined');
  icon.classList.add('spin-once');
  icon.addEventListener('animationend', function() {
    icon.classList.remove('spin-once');
  }, { once: true });
  refreshApps();
});

retryBtn.addEventListener('click', refreshApps);

/* ─────────────────────────────────────────
   Boot — load from API
───────────────────────────────────────── */
loadFromAPI();
</script>
</body>
</html>
