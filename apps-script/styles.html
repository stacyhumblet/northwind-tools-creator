<style>
/* ─────────────────────────────────────────
   Northwind Tools Suite — Dark Mode
   Brand palette: Navy (#1a2744) · Teal (#5a9fc2)
───────────────────────────────────────── */
:root {
  --color-bg:          #080e1c;
  --color-surface:     #111c36;
  --color-surface-2:   #1a2744;
  --color-border:      rgba(90, 159, 194, 0.18);
  --color-primary:     #5a9fc2;
  --color-primary-dim: rgba(90, 159, 194, 0.15);
  --color-text:        #ddeaf6;
  --color-text-muted:  rgba(190, 215, 235, 0.5);
  --color-success:     #34a08e;
  --color-error:       #e05c6a;

  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.45);
  --transition:  0.2s ease;
}

/* ─────────────────────────────────────────
   Reset & base
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─────────────────────────────────────────
   Header
───────────────────────────────────────── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8, 14, 28, 0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--color-border);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.brand-logo-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 46px;
  height: 46px;
  background: rgba(255, 255, 255, 0.92);
  border-radius: var(--radius-md);
  padding: 5px;
  flex-shrink: 0;
}

.brand-logo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.brand-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--color-text);
}

.brand-sub {
  font-size: 10px;
  color: var(--color-primary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  opacity: 0.85;
}

/* Header controls */
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  justify-content: flex-end;
}

.search-wrap {
  position: relative;
  width: 230px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--color-text-muted);
  pointer-events: none;
}

#searchInput {
  width: 100%;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text);
  font-size: 14px;
  padding: 8px 12px 8px 40px;
  outline: none;
  font-family: inherit;
  transition: border-color var(--transition), box-shadow var(--transition);
}

#searchInput::placeholder { color: var(--color-text-muted); }

#searchInput:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-dim);
}

.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-muted);
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition), background var(--transition);
  flex-shrink: 0;
}

.icon-btn:hover {
  color: var(--color-primary);
  border-color: var(--color-primary);
  background: var(--color-primary-dim);
}

.icon-btn .material-symbols-outlined { font-size: 20px; }

/* ─────────────────────────────────────────
   Main / grid
───────────────────────────────────────── */
main {
  flex: 1;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
  padding: 24px 24px 64px;
}

/* ── Section headings ── */
.section-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.1px;
  color: var(--color-text-muted);
}

.section-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border);
}

.section-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── App grid ── */
.app-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.category-section {
  display: flex;
  flex-direction: column;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 16px;
}

/* ─────────────────────────────────────────
   App card
───────────────────────────────────────── */
.app-card {
  position: relative;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  text-decoration: none;
  color: inherit;
  transition:
    transform var(--transition),
    border-color var(--transition),
    box-shadow var(--transition),
    background var(--transition);
  overflow: hidden;
  cursor: pointer;
}

.app-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  background: var(--accent, var(--color-primary));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--transition);
}

.app-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent, var(--color-primary));
  box-shadow: var(--shadow-card), 0 0 0 1px var(--accent, var(--color-primary)) inset;
  background: var(--color-surface-2);
}

.app-card:hover::before { transform: scaleX(1); }

/* Card icon bubble */
.card-icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-dim, var(--color-primary-dim));
  flex-shrink: 0;
}

.card-icon-wrap .material-symbols-outlined {
  font-size: 24px;
  color: var(--accent, var(--color-primary));
}

/* Card content */
.card-body { display: flex; flex-direction: column; gap: 5px; flex: 1; }

.card-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--color-text);
}

.card-category {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent, var(--color-primary));
}

.card-purpose {
  font-size: 12px;
  color: var(--color-text-muted);
  line-height: 1.55;
  margin-top: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Launch badge */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-muted);
  transition: color var(--transition);
}

.app-card:hover .card-footer { color: var(--accent, var(--color-primary)); }

.card-footer .material-symbols-outlined { font-size: 16px; }

/* ─────────────────────────────────────────
   State containers
───────────────────────────────────────── */
.state-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 340px;
  gap: 16px;
  color: var(--color-text-muted);
}

.state-icon {
  font-size: 56px;
  color: var(--color-text-muted);
}

.error-icon { color: var(--color-error); }

.spinner {
  width: 42px;
  height: 42px;
  border: 3px solid var(--color-border);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.btn-primary {
  padding: 10px 28px;
  background: var(--color-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity var(--transition), transform var(--transition);
}

.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

/* ─────────────────────────────────────────
   Footer
───────────────────────────────────────── */
.site-footer {
  border-top: 1px solid var(--color-border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--color-text-muted);
  gap: 16px;
  flex-wrap: wrap;
  background: var(--color-surface);
}

.footer-link {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--color-text-muted);
  text-decoration: none;
  font-weight: 500;
  transition: color var(--transition);
}

.footer-link:hover { color: var(--color-primary); }
.footer-link .material-symbols-outlined { font-size: 16px; }

/* ─────────────────────────────────────────
   Section navigator (floating left)
───────────────────────────────────────── */
.section-nav {
  position: fixed;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 90;
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: rgba(17, 28, 54, 0.9);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 8px 6px;
}

.section-nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--color-text-muted);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 10px 5px 8px;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
  cursor: pointer;
  white-space: nowrap;
}

.section-nav-item .nav-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.4;
  transition: all var(--transition);
}

.section-nav-item:hover {
  color: var(--color-text);
  background: var(--color-surface-2);
}

.section-nav-item:hover .nav-dot {
  opacity: 1;
  transform: scale(1.3);
}

.section-nav-item.active {
  color: var(--color-text);
  background: var(--color-surface-2);
  font-weight: 600;
}

.section-nav-item.active .nav-dot {
  opacity: 1;
  transform: scale(1.4);
}

/* ─────────────────────────────────────────
   Scroll hint arrow
───────────────────────────────────────── */
.scroll-hint {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text-muted);
  pointer-events: none;
  animation: bounce-hint 1.6s ease-in-out infinite;
  transition: opacity 0.4s ease;
}

.scroll-hint .material-symbols-outlined { font-size: 22px; }

.scroll-hint.hint-fade-out {
  opacity: 0;
  pointer-events: none;
}

@keyframes bounce-hint {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(6px); }
}

/* ─────────────────────────────────────────
   Screenshot preview popup
───────────────────────────────────────── */
.card-preview-popup {
  position: fixed;
  z-index: 300;
  width: 320px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.65);
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px) scale(0.97);
  transition: opacity 0.15s ease, transform 0.15s ease;
}

.card-preview-popup.preview-visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.card-preview-popup img {
  width: 100%;
  height: auto;
  max-height: 210px;
  object-fit: cover;
  object-position: top center;
  display: block;
}

.card-preview-label {
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  border-top: 1px solid var(--color-border);
}

/* ─────────────────────────────────────────
   Utility
───────────────────────────────────────── */
.hidden { display: none !important; }

/* Refresh spin animation */
@keyframes spin-once {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.spin-once { animation: spin-once 0.5s ease; }

/* ─────────────────────────────────────────
   Responsive
───────────────────────────────────────── */
@media (max-width: 600px) {
  .header-inner  { padding: 0 16px; }
  .brand-sub     { display: none; }
  main           { padding: 16px 16px 48px; }
  .cards-grid    { grid-template-columns: 1fr; }
  .section-nav   { display: none; }
  .scroll-hint   { display: none; }
}

@media (min-width: 601px) and (max-width: 1100px) {
  .section-nav { display: none; }
}

@media (min-width: 1101px) {
  main { padding-left: 220px; }
}

@media (max-width: 800px) {
  .search-wrap { width: 170px; }
}
</style>
